<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jake McCormick | Gallery</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
        }

        header {
            padding: 4rem 2rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 300;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            justify-items: center;
        }

        .gallery-item {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            aspect-ratio: 4/5;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .img-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 2rem 1.5rem 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .gallery-item:hover .img-overlay {
            opacity: 1;
        }

        .img-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- Import Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Jake McCormick</h1>
        <p class="subtitle">Selected Works Gallery</p>
    </header>

    <main class="gallery-container">
        <div class="gallery-grid">
            
            <div class="gallery-item">
                <img src="images/McCormick_Jake_Ominous_Landscape.jpg" alt="Ominous Landscape" loading="lazy">
                <div class="img-overlay">
                    <span class="img-title">Ominous Landscape</span>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/MAYBEMcCormickJakeMonster1.jpg" alt="Monster 1" loading="lazy">
                <div class="img-overlay">
                    <span class="img-title">Monster 1</span>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/MAYBEMcCormickJakeMonster2.jpg" alt="Monster 2" loading="lazy">
                <div class="img-overlay">
                    <span class="img-title">Monster 2</span>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/testimg.jpg" alt="Test Image" loading="lazy">
                <div class="img-overlay">
                    <span class="img-title">Test Image</span>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
